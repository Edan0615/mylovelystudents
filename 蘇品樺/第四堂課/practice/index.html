<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第四堂課：語法與邏輯實作練習</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            background-color: #fcfcfc;
            font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif;
        }

        .practice-card {
            background: white;
            border-radius: 2.5rem;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
            padding: 3rem;
            max-width: 600px;
            width: 100%;
        }

        .code-input {
            background: #f8f8f8;
            border-radius: 1rem;
            padding: 1rem;
            font-family: monospace;
            width: 100%;
            border: 1px solid #eee;
            outline: none;
            transition: all 0.3s;
        }

        .code-input:focus {
            border-color: #ff7b00;
            background: white;
        }

        .result-box {
            height: 100px;
            background: #121212;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 1.5rem;
            margin-top: 1.5rem;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6">

    <div class="practice-card space-y-10">
        <div class="text-center">
            <span class="text-[10px] font-black uppercase tracking-[0.3em] text-orange-500 mb-2 block">Practice Mode</span>
            <h1 class="text-3xl font-black italic">JS 邏輯實作：蘇品樺</h1>
        </div>

        <!-- Exercise 1: Variables & If/Else -->
        <div class="space-y-4">
            <h3 class="font-bold text-sm uppercase tracking-widest text-zinc-400">1. 分數判斷 (If/Else)</h3>
            <p class="text-xs text-zinc-500">輸入分數，點擊按鈕判斷是否及格（60分為界）。</p>
            <div class="flex gap-2">
                <input type="number" id="scoreInput" placeholder="輸入分數..." class="code-input">
                <button id="checkScore" class="px-6 bg-zinc-900 text-white rounded-xl font-bold text-xs whitespace-nowrap">判斷</button>
            </div>
            <div id="scoreResult" class="text-center font-bold text-orange-500 h-6"></div>
        </div>

        <hr class="border-zinc-100">

        <!-- Exercise 2: Loops & Arrays -->
        <div class="space-y-4">
            <h3 class="font-bold text-sm uppercase tracking-widest text-zinc-400">2. 陣列與迴圈 (Loop)</h3>
            <p class="text-xs text-zinc-500">分別點擊按鈕，使用 `for` 與 `while` 迴圈顯示內容。</p>
            <div class="flex flex-wrap gap-2 mb-4" id="arrayItems">
                <!-- Items will appear here -->
            </div>
            <div class="flex gap-2">
                <button id="runForLoop" class="flex-1 py-4 bg-zinc-900 text-white rounded-xl font-black uppercase text-[10px] tracking-widest">For 迴圈秀圖</button>
                <button id="runWhileLoop" class="flex-1 py-4 bg-orange-500 text-white rounded-xl font-black uppercase text-[10px] tracking-widest">While 迴圈秀圖</button>
            </div>
        </div>

        <hr class="border-zinc-100">

        <!-- Exercise 3: Functions & DOM -->
        <div class="space-y-4">
            <h3 class="font-bold text-sm uppercase tracking-widest text-zinc-400">3. 函式打包 (Functions)</h3>
            <p class="text-xs text-zinc-500">呼叫一個名為 `magicAnimate` 的函式，傳入不同參數來控制方塊。</p>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="magicAnimate('rotate')" class="p-3 bg-zinc-100 rounded-lg text-[10px] font-bold">旋轉</button>
                <button onclick="magicAnimate('scale')" class="p-3 bg-zinc-100 rounded-lg text-[10px] font-bold">放大</button>
                <button onclick="magicAnimate('color')" class="p-3 bg-zinc-100 rounded-lg text-[10px] font-bold">變色</button>
            </div>
            <div class="result-box" id="magicBox">Target</div>
        <hr class="border-zinc-100">

        <!-- Exercise 4: Switch Case -->
        <div class="space-y-4">
            <h3 class="font-bold text-sm uppercase tracking-widest text-zinc-400">4. 星期判斷 (Switch)</h3>
            <p class="text-xs text-zinc-500">輸入數字 1-3，判斷當天心情（練習 Switch 語法）。</p>
            <div class="flex gap-2">
                <input type="number" id="dayInput" placeholder="輸入 1-3..." class="code-input">
                <button id="checkDay" class="px-6 bg-zinc-900 text-white rounded-xl font-bold text-xs whitespace-nowrap">切換</button>
            </div>
            <div id="dayResult" class="text-center font-bold text-blue-500 h-6"></div>
        </div>
    </div>

    <script>
        // --- 練習 1: 判斷邏輯 ---
        $("#checkScore").on("click", function() {
            let score = $("#scoreInput").val();
            if (score === "") return;

            if (score >= 60) {
                $("#scoreResult").text("🎉 恭喜及格！").css("color", "#10b981");
            } else {
                $("#scoreResult").text("😅 還差一點，再加油！").css("color", "#ff7b00");
            }
        });

        // --- 練習 2: 陣列與迴圈 ---
        const emojis = ["🚀", "🔥", "✨", "💎", "🎯"];
        
        // For 迴圈
        $("#runForLoop").on("click", function() {
            $("#arrayItems").empty();
            for (let i = 0; i < emojis.length; i++) {
                renderItem(emojis[i], i);
            }
        });

        // While 迴圈
        $("#runWhileLoop").on("click", function() {
            $("#arrayItems").empty();
            let i = 0;
            while (i < emojis.length) {
                renderItem(emojis[i], i);
                i++;
            }
        });

        function renderItem(content, index) {
            setTimeout(() => {
                let item = $(`<div class="w-10 h-10 bg-zinc-100 rounded-lg flex items-center justify-center text-xl shadow-sm">${content}</div>`);
                $("#arrayItems").append(item);
                gsap.from(item, { scale: 0, rotation: -45, duration: 0.5, ease: "back.out" });
            }, index * 200);
        }

        // --- 練習 3: 函式封裝 ---
        function magicAnimate(type) {
            const $box = $("#magicBox");
            
            if (type === 'rotate') {
                gsap.to($box, { rotation: "+=360", duration: 0.5 });
            } else if (type === 'scale') {
                gsap.to($box, { scale: 1.5, yoyo: true, repeat: 1, duration: 0.3 });
            } else if (type === 'color') {
                const colors = ["#ff7b00", "#3b82f6", "#8b5cf6", "#121212"];
                const rand = colors[Math.floor(Math.random() * colors.length)];
                gsap.to($box, { backgroundColor: rand, duration: 0.3 });
            }
        }

        // --- 練習 4: Switch ---
        $("#checkDay").on("click", function() {
            let day = parseInt($("#dayInput").val());
            let result = "";
            switch (day) {
                case 1: result = "😫 週一：需要咖啡"; break;
                case 2: result = "🙂 週二：進入狀態"; break;
                case 3: result = "🚀 週三：全力衝刺"; break;
                default: result = "🌈 其他日子也加油！";
            }
            $("#dayResult").text(result);
            gsap.from("#dayResult", { y: 10, opacity: 0, duration: 0.3 });
        });
    </script>
</body>

</html>
